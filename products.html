<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Products - Häus of NYCO</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="logo-bg"></div>

    <nav>
        <div class="nav-left">
            <img src="assets/logo.jpeg" alt="Haus of NYCO" style="height: 40px; object-fit: contain;">
        </div>

        <div class="nav-search">
            <input type="text" id="navSearchInput" placeholder="Search products…">
            <button onclick="performSearch()">
                <i class="fas fa-search"></i>
            </button>
        </div>

        <ul class="nav-links desktop-nav">
            <li><a href="index.html">Home</a></li>
            <li><a href="products.html" class="active">Products</a></li>
            <li><a href="contact.html">Contact</a></li>
        </ul>

        <div class="burger" id="burgerBtn">
            <div class="line"></div>
            <div class="line"></div>
            <div class="line"></div>
        </div>
    </nav>

    <div class="mobile-menu" id="mobileMenu">
        <ul class="mobile-nav-links">
            <li><a href="index.html">Home</a></li>
            <li><a href="products.html">Products</a></li>
            <li><a href="contact.html">Contact</a></li>
            <li class="mobile-social">
                <a href="https://facebook.com" target="_blank"><i class="fab fa-facebook"></i></a>
                <a href="https://twitter.com" target="_blank"><i class="fab fa-twitter"></i></a>
                <a href="https://instagram.com" target="_blank"><i class="fab fa-instagram"></i></a>
            </li>
        </ul>
    </div>

    <main>
        <div class="filter-bar">
            <input 
                type="text" 
                class="search-input" 
                id="searchInput" 
                placeholder="Search products..."
            >
            <div class="filter-chips">
                <button class="filter-chip" data-filter="bluetooth">Bluetooth</button>
                <button class="filter-chip" data-filter="battery">Longer Battery</button>
                <button class="filter-chip" data-filter="aux">Aux Cable</button>
                <button class="filter-chip" data-filter="pods">Pods</button>
                <button class="filter-chip" data-filter="earphones">Earphones</button>
            </div>
        </div>

        <div class="products-container" id="productsGrid"></div>
    </main>

    <div class="overlay" id="overlay"></div>
    
    <div class="info-panel" id="infoPanel">
        <button class="info-close" id="closeBtn">&times;</button>
        <div class="info-image" id="infoImage">
            <img src="" alt="Product" id="infoPanelImg">
        </div>
        <h2 class="info-title" id="infoTitle">Product Name</h2>
        
        <div class="info-section">
            <div class="info-section-title">Available colors</div>
            <div class="color-options" id="colorOptions"></div>
        </div>
        
        <div class="info-section">
            <div class="info-section-title">Battery life</div>
            <p class="battery-life" id="batteryLife">8 hours</p>
        </div>
        
        <div class="info-section">
            <div class="info-section-title">Features</div>
            <ul class="info-list" id="featuresList">
                <li>Feature 1</li>
                <li>Feature 2</li>
                <li>Feature 3</li>
            </ul>
        </div>
        
        <button class="add-to-cart">Add to cart</button>
    </div>

    <footer>
        <p>&copy; 2026 Häus Of NYCO. All rights reserved. | <a href="contact.html">Contact</a> | <a href="index.html">Home</a></p>
        <p>Designed By Dynaframe Studios</p>
    </footer>

    <script src="products-data.js"></script>
    <script>
        let currentProduct = null;
        const allProducts = products;
 
        function renderProducts(filtered = allProducts) {
            const grid = document.getElementById("productsGrid");
            grid.innerHTML = filtered.map(p => `
                <div class="product-item" onclick="openProduct(${p.id})">
                    <div class="product-image">
                        <img src="${p.image}" alt="${p.name}">
                    </div>
                    <div class="product-name">${p.name}</div>
                </div>
            `).join("");
        }
 
        function openProduct(id) {
            currentProduct = allProducts.find(p => p.id === id);
            if (!currentProduct) return;
 
            const panel = document.getElementById("infoPanel");
            const overlay = document.getElementById("overlay");
            
            document.getElementById("infoPanelImg").src = currentProduct.image;
            document.getElementById("infoTitle").textContent = currentProduct.name;
            document.getElementById("batteryLife").textContent = currentProduct.battery;
            
            document.getElementById("colorOptions").innerHTML = currentProduct.colors
                .map(c => `<div class="color-swatch" style="background-color: ${c};"></div>`)
                .join("");
            
            document.getElementById("featuresList").innerHTML = currentProduct.features
                .map(f => `<li>${f}</li>`)
                .join("");
            
            panel.classList.add("active");
            overlay.classList.add("active");
        }
 
        function closeProduct() {
            const panel = document.getElementById("infoPanel");
            const overlay = document.getElementById("overlay");
            panel.classList.remove("active");
            overlay.classList.remove("active");
        }
 
        document.getElementById("closeBtn").addEventListener("click", closeProduct);
        document.getElementById("overlay").addEventListener("click", closeProduct);
 
        document.getElementById("searchInput").addEventListener("input", (e) => {
            const query = e.target.value.toLowerCase();
            const filtered = allProducts.filter(p => p.name.toLowerCase().includes(query));
            renderProducts(filtered);
        });
 
        document.querySelectorAll(".filter-chip").forEach(chip => {
            chip.addEventListener("click", () => {
                chip.classList.toggle("active");
                applyFilters();
            });
        });
 
        function applyFilters() {
            const activeFilters = Array.from(document.querySelectorAll(".filter-chip.active"))
                .map(c => c.dataset.filter);
            
            if (activeFilters.length === 0) {
                renderProducts(allProducts);
                return;
            }
            
            const filtered = allProducts.filter(p => 
                activeFilters.some(f => p.tags.includes(f))
            );
            renderProducts(filtered);
        }
 
        renderProducts();

        // Mobile menu toggle
        const burger = document.getElementById('burgerBtn');
        const mobileMenu = document.getElementById('mobileMenu');

        if (burger && mobileMenu) {
            burger.addEventListener('click', () => {
                mobileMenu.classList.toggle('active');
            });

            document.querySelectorAll('.mobile-nav-links a').forEach(link => {
                link.addEventListener('click', () => {
                    mobileMenu.classList.remove('active');
                });
            });
        }

        // Search function for navbar
        function performSearch() {
            const query = document.getElementById('navSearchInput').value.trim();
            if (query !== '') {
                document.getElementById('searchInput').value = query;
                document.getElementById('searchInput').dispatchEvent(new Event('input'));
            }
        }

        document.getElementById('navSearchInput').addEventListener('keyup', (e) => {
            if (e.key === 'Enter') {
                performSearch();
            }
        });

        // Read search query from URL (if coming from homepage)
        window.addEventListener('DOMContentLoaded', function() {
            const params = new URLSearchParams(window.location.search);
            const searchQuery = params.get('search');
            if (searchQuery) {
                const input = document.getElementById('searchInput');
                if (input) {
                    input.value = searchQuery;
                    input.dispatchEvent(new Event('input'));
                }
            }
        });
    </script>
</body>
</html>
